<body>

        </ul>

</header>

<main class="kalkulator-main">
<div class="card">
    <h2>Kalkulator</h2>

    <form onsubmit="hitung(); return false;">

        Angka 1:
        <input type="number" id="angka1" required>

        Angka 2:
        <input type="number" id="angka2" required>

        <div class="radio-group">
            <input type="radio" name="operasi" value="tambah" required> Tambah <br>
            <input type="radio" name="operasi" value="kurang"> Kurang <br>
            <input type="radio" name="operasi" value="kali"> Kali <br>
            <input type="radio" name="operasi" value="bagi"> Bagi
        </div>

        <button type="submit">Hitung</button>

    </form>

    <h3>Hasil: <span id="hasil"></span></h3>
</div>
</main>

<script>
function hitung() {
    let a = parseFloat(document.getElementById("angka1").value);
    let b = parseFloat(document.getElementById("angka2").value);
    let operasi = document.querySelector('input[name="operasi"]:checked').value;
    let hasil;

    if (operasi === "tambah") {
        hasil = a + b;
    } else if (operasi === "kurang") {
        hasil = a - b;
    } else if (operasi === "kali") {
        hasil = a * b;
    } else if (operasi === "bagi") {
        hasil = a / b;
    }

    document.getElementById("hasil").innerText = hasil;
}
</script>
